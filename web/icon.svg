<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Roka">
  <!--
    Roka app icon — a stylized coin-locker door:
      • dark slate base
      • amber LED bar across (the OTP readout)
      • vermilion locker-handle accent
      • subtle gradient + top highlight (the "steel" feel)
    Scales cleanly from favicon (16) to PWA 512 because it's pure SVG.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1f25"/>
      <stop offset="1" stop-color="#0c0e11"/>
    </linearGradient>
    <linearGradient id="led" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#ffb53a"/>
      <stop offset="1"   stop-color="#ffd07a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- frame -->
  <rect x="32" y="32" width="448" height="448" rx="64" fill="url(#bg)"/>
  <!-- top specular highlight -->
  <rect x="32" y="32" width="448" height="3" rx="2" fill="rgba(255,255,255,0.10)"/>
  <!-- vermilion side stripe (transit-signage accent) -->
  <rect x="32" y="120" width="14" height="272" fill="#d94340"/>

  <!-- LED window (the "code readout") -->
  <rect x="96" y="180" width="320" height="152" rx="10" fill="#000"
        stroke="rgba(255,181,58,0.15)" stroke-width="2"/>

  <!-- Three "digit blocks" — abstracted -->
  <g filter="url(#glow)" fill="url(#led)">
    <rect x="124" y="218" width="56" height="76" rx="6"/>
    <rect x="196" y="218" width="56" height="76" rx="6"/>
    <rect x="268" y="218" width="56" height="76" rx="6"/>
  </g>
  <!-- thin separator between digits, like LED dashes -->
  <g fill="#ffb53a" opacity="0.45">
    <rect x="184" y="252" width="8" height="10"/>
    <rect x="256" y="252" width="8" height="10"/>
    <rect x="332" y="252" width="56" height="76" rx="6" opacity="0.18"/>
  </g>

  <!-- countdown ring (lower-right corner, decorative) -->
  <g transform="translate(380, 380)">
    <circle r="32" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6"/>
    <circle r="32" fill="none" stroke="#ffb53a" stroke-width="6"
            stroke-linecap="round" stroke-dasharray="201.06" stroke-dashoffset="60"
            transform="rotate(-90)"/>
  </g>

  <!-- locker "handle" (small chrome knob top-right) -->
  <circle cx="416" cy="130" r="14" fill="#5d6068"/>
  <circle cx="416" cy="130" r="6"  fill="#9a9da4"/>
</svg>
