# Deploy web/ to GitHub Pages on push to main.
#
# One-time setup on GitHub:
#   Repo Settings → Pages → Source: "GitHub Actions"
# After enabling, every push to main publishes to
#   https://goliajp.github.io/roka/
#
# The web/pkg/*.wasm bundle is committed to the repo so this workflow does NOT
# need to install Rust or wasm-pack; rebuild + commit locally with web/build.sh
# when the wasm crate changes.

name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./web
      - id: deployment
        uses: actions/deploy-pages@v4
